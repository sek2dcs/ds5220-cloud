apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka
spec:
  clusterIP: None
  publishNotReadyAddresses: true 
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
  namespace: kafka
spec:
  type: ClusterIP
  ports:
    - name: broker
      port: 9092
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          env:
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512M -Xms512M"
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Force unset everything that could possibly interfere
              for var in $(env | grep KAFKA | cut -d= -f1); do unset $var; done
              
              NODE_ID=${HOSTNAME##*-}
              FQDN=${HOSTNAME}.kafka-headless.kafka.svc.cluster.local
              
              echo "Starting Node $NODE_ID..."
              sleep 5

              # Create the most basic config possible
              cat <<EOF > /tmp/server.properties
              process.roles=broker,controller
              node.id=${NODE_ID}
              controller.quorum.voters=0@kafka-0.kafka-headless.kafka.svc.cluster.local:9093,1@kafka-1.kafka-headless.kafka.svc.cluster.local:9093,2@kafka-2.kafka-headless.kafka.svc.cluster.local:9093
              controller.listener.names=CONTROLLER
              listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
              inter.broker.listener.name=PLAINTEXT
              log.dirs=/tmp/kraft-logs
              EOF

              rm -rf /tmp/kraft-logs/*

              # THE OVERPOWER MOVE: 
              # We pass the listeners explicitly as overrides so they overwrite EVERYTHING else.
              /opt/kafka/bin/kafka-storage.sh format \
                --cluster-id "MkU3OEVBNTcwNTJENDM2Qk" \
                --config /tmp/server.properties \
                --add-config "listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" \
                --add-config "advertised.listeners=PLAINTEXT://${FQDN}:9092"

              exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties \
                --override listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093 \
                --override advertised.listeners=PLAINTEXT://${FQDN}:9092
          resources:
            requests:
              memory: "800Mi"
            limits:
              memory: "1024Mi"