apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka
spec:
  clusterIP: None
  publishNotReadyAddresses: true # Allows nodes to find each other before they are "Ready"
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
  namespace: kafka
spec:
  type: ClusterIP
  ports:
    - name: broker
      port: 9092
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          env:
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
          command: ["/bin/bash", "-c"]
          args:
            - |
              # 1. Identify ourselves
              NODE_ID=${HOSTNAME##*-}
              FQDN=${HOSTNAME}.kafka-headless.kafka.svc.cluster.local
              
              echo "Starting Kafka Node $NODE_ID with FQDN $FQDN"

              # 2. Wait for DNS to be resolvable (The "Wait-Loop")
              # This prevents the UnknownHostException by pausing until the network works.
              until getent hosts $FQDN; do
                echo "Waiting for DNS $FQDN to be resolvable..."
                sleep 2
              done

              # 3. Clean environment
              rm -rf /tmp/kraft-combined-logs/*

              # 4. Generate properties
              cat <<EOF > /tmp/server.properties
              process.roles=broker,controller
              node.id=${NODE_ID}
              controller.quorum.voters=0@kafka-0.kafka-headless.kafka.svc.cluster.local:9093,1@kafka-1.kafka-headless.kafka.svc.cluster.local:9093,2@kafka-2.kafka-headless.kafka.svc.cluster.local:9093
              listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
              advertised.listeners=PLAINTEXT://${FQDN}:9092
              controller.listener.names=CONTROLLER
              listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
              inter.broker.listener.name=PLAINTEXT
              log.dirs=/tmp/kraft-combined-logs
              offsets.topic.replication.factor=3
              default.replication.factor=3
              min.insync.replicas=1
              EOF

              # 5. Format and Exec
              /opt/kafka/bin/kafka-storage.sh format --cluster-id "$CLUSTER_ID" --config /tmp/server.properties --ignore-formatted
              
              echo "Executing kafka-server-start..."
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
          resources:
            requests:
              memory: "768Mi" # Bumped slightly for stability on Mac
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "1"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 45 # Give Java plenty of time to warm up
            periodSeconds: 10