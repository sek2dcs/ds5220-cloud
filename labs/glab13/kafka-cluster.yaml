apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka
spec:
  clusterIP: None
  # Crucial: allows nodes to find each other via DNS before they are "Ready"
  publishNotReadyAddresses: true
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
  namespace: kafka
spec:
  type: ClusterIP
  ports:
    - name: broker
      port: 9092
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  # Sequential rollout is safer for initial quorum formation
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          env:
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Extract numeric ID from pod name (kafka-0 -> 0)
              NODE_ID=${HOSTNAME##*-}
              FQDN=${HOSTNAME}.kafka-headless.kafka.svc.cluster.local
              
              # Clear previous failed attempts
              rm -rf /tmp/kraft-combined-logs/*

              # Build a clean configuration file
              cat <<EOF > /tmp/server.properties
              process.roles=broker,controller
              node.id=${NODE_ID}
              controller.quorum.voters=0@kafka-0.kafka-headless.kafka.svc.cluster.local:9093,1@kafka-1.kafka-headless.kafka.svc.cluster.local:9093,2@kafka-2.kafka-headless.kafka.svc.cluster.local:9093
              listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
              advertised.listeners=PLAINTEXT://${FQDN}:9092
              controller.listener.names=CONTROLLER
              listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
              inter.broker.listener.name=PLAINTEXT
              log.dirs=/tmp/kraft-combined-logs
              offsets.topic.replication.factor=3
              default.replication.factor=3
              # Set a short timeout for initial startup stability
              controller.quorum.election.timeout.ms=1000
              controller.quorum.fetch.timeout.ms=2000
              EOF

              # Format storage
              /opt/kafka/bin/kafka-storage.sh format --cluster-id "$CLUSTER_ID" --config /tmp/server.properties --ignore-formatted
              
              # Start Kafka
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 5