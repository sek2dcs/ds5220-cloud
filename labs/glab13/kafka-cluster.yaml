apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka
spec:
  clusterIP: None
  publishNotReadyAddresses: true 
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
  namespace: kafka
spec:
  type: ClusterIP
  ports:
    - name: broker
      port: 9092
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          env:
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512M -Xms512M"
          command: ["/bin/bash", "-c"]
          args:
            - |
              NODE_ID=${HOSTNAME##*-}
              # Using the simpler internal FQDN
              FQDN=${HOSTNAME}.kafka-headless.kafka.svc.cluster.local
              
              echo "Pre-start: Waiting for DNS stabilization..."
              sleep 10

              # Wipe any previous failed Kraft logs
              rm -rf /tmp/kraft-combined-logs/*

              # Create a TOTALLY isolated properties file
              # Note: We removed the second listener from advertised.listeners
              cat <<EOF > /tmp/custom-server.properties
              process.roles=broker,controller
              node.id=${NODE_ID}
              controller.quorum.voters=0@kafka-0.kafka-headless.kafka.svc.cluster.local:9093,1@kafka-1.kafka-headless.kafka.svc.cluster.local:9093,2@kafka-2.kafka-headless.kafka.svc.cluster.local:9093
              listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
              advertised.listeners=PLAINTEXT://${FQDN}:9092
              controller.listener.names=CONTROLLER
              listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
              inter.broker.listener.name=PLAINTEXT
              log.dirs=/tmp/kraft-combined-logs
              offsets.topic.replication.factor=3
              default.replication.factor=3
              min.insync.replicas=1
              EOF

              echo "Formatting storage using custom config..."
              /opt/kafka/bin/kafka-storage.sh format --cluster-id "$CLUSTER_ID" --config /tmp/custom-server.properties --ignore-formatted
              
              echo "Starting Kafka with custom config..."
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/custom-server.properties
          resources:
            requests:
              memory: "800Mi"
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "1"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10