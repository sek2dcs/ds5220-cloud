apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka
spec:
  clusterIP: None
  publishNotReadyAddresses: true 
  ports:
    - name: broker port: 9092
    - name: controller port: 9093
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          env:
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
            - name: KAFKA_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Kill any conflicting env vars
              unset KAFKA_ADVERTISED_LISTENERS
              unset KAFKA_LISTENERS
              
              # Construct the FQDN manually using the injected POD_NAME
              export ADVERTISED_HOSTNAME="${POD_NAME}.kafka-headless.kafka.svc.cluster.local"
              
              echo "Formatting for Node ${KAFKA_NODE_ID} at ${ADVERTISED_HOSTNAME}"
              
              # Create a clean properties file
              cat <<EOF > /tmp/server.properties
              process.roles=broker,controller
              node.id=${KAFKA_NODE_ID}
              controller.quorum.voters=0@kafka-0.kafka-headless.kafka.svc.cluster.local:9093,1@kafka-1.kafka-headless.kafka.svc.cluster.local:9093,2@kafka-2.kafka-headless.kafka.svc.cluster.local:9093
              listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
              advertised.listeners=PLAINTEXT://${ADVERTISED_HOSTNAME}:9092
              controller.listener.names=CONTROLLER
              listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
              inter.broker.listener.name=PLAINTEXT
              log.dirs=/tmp/kraft-logs
              offsets.topic.replication.factor=3
              default.replication.factor=3
              min.insync.replicas=1
              EOF

              rm -rf /tmp/kraft-logs/*

              # Format and start
              /opt/kafka/bin/kafka-storage.sh format --cluster-id "$CLUSTER_ID" --config /tmp/server.properties --ignore-formatted
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties