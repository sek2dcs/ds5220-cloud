apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: kafka
spec:
  clusterIP: None
  publishNotReadyAddresses: true 
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
  namespace: kafka
spec:
  type: ClusterIP
  ports:
    - name: broker
      port: 9092
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          env:
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512M -Xms512M"
          command: ["/bin/bash", "-c"]
          args:
            - |
              # 1. Identify node
              MY_ID=${HOSTNAME##*-}
              MY_FQDN=${HOSTNAME}.kafka-headless.kafka.svc.cluster.local
              
              echo "Starting Node $MY_ID (DNS: $MY_FQDN)"
              sleep 5

              # 2. Kill every single KAFKA environment variable
              # This prevents the image's internal Scala/Java code from 
              # seeing ANY auto-injected settings.
              for var in $(env | grep KAFKA_ | cut -d= -f1); do unset $var; done
              
              # 3. Create a totally custom, isolated config file
              cat <<EOF > /tmp/server.properties
              process.roles=broker,controller
              node.id=${MY_ID}
              controller.quorum.voters=0@kafka-0.kafka-headless.kafka.svc.cluster.local:9093,1@kafka-1.kafka-headless.kafka.svc.cluster.local:9093,2@kafka-2.kafka-headless.kafka.svc.cluster.local:9093
              listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
              advertised.listeners=PLAINTEXT://${MY_FQDN}:9092
              controller.listener.names=CONTROLLER
              listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
              inter.broker.listener.name=PLAINTEXT
              log.dirs=/tmp/kraft-logs
              offsets.topic.replication.factor=3
              default.replication.factor=3
              min.insync.replicas=1
              EOF

              # 4. Clean previous logs
              rm -rf /tmp/kraft-logs/*

              # 5. Run the storage tool DIRECTLY (bypassing wrapper scripts)
              /opt/kafka/bin/kafka-storage.sh format \
                --cluster-id "$CLUSTER_ID" \
                --config /tmp/server.properties

              # 6. Start Kafka DIRECTLY
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
          resources:
            requests:
              memory: "800Mi"
              cpu: "250m"
            limits:
              memory: "1024Mi"
              cpu: "1"